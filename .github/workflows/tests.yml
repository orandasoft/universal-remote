name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install infrared-protocols==6.2.0

      - name: Compile integration and tests
        run: |
          python -m compileall -f custom_components/universal_remote tests

      - name: Run Ruff
        run: |
          ruff check custom_components/universal_remote tests

      - name: Run mypy
        run: |
          mypy custom_components/universal_remote tests

      - name: Run tests
        run: |
          pytest --cov=custom_components.universal_remote --cov-report=term-missing